<!DOCTYPE html>
<html>
<head>
    <title>Presensi Online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-light p-3">
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 450px; margin-top: 50px;">
        <h3 class="text-center mb-4">E-Presensi</h3>
        
        <div id="siswaArea">
            <input type="number" id="nisn" class="form-control mb-3" placeholder="Masukkan NISN">
            <button class="btn btn-primary w-100" id="btnAbsen" onclick="absen()">Klik Untuk Absen</button>
        </div>

        <div id="adminArea" class="mt-4 border-top pt-3">
            <p class="small text-muted text-center" onclick="showAdmin()">Menu Admin</p>
            <div id="adminPanel" style="display:none;">
                <input type="password" id="pass" class="form-control mb-2" placeholder="Password Admin">
                <button class="btn btn-dark btn-sm w-100 mb-3" onclick="login()">Login</button>
                <div id="dash" style="display:none;">
                    <select id="fKelas" class="form-select mb-2"><option>Semua</option></select>
                    <button class="btn btn-success btn-sm w-100" onclick="download()">Download XLS</button>
                </div>
            </div>
        </div>
        <div id="status" class="mt-3 text-center small fw-bold"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby9sF0O-Ixiv8LH7rxGhFdBtwxX9OkReJANQGkXUVem_c_10UPyhcla1Q8_hymdDdmU/exec"; // GANTI DENGAN URL EXEC KAMU

        function absen() {
            const nisn = document.getElementById('nisn').value;
            if(!nisn) return alert("Isi NISN!");
            
            document.getElementById('status').innerText = "Mencari GPS...";
            navigator.geolocation.getCurrentPosition(pos => {
                const payload = { 
                    action: "submit", 
                    nisn: nisn, 
                    lat: pos.coords.latitude, 
                    lng: pos.coords.longitude 
                };
                
                fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
                .then(r => r.json())
                .then(res => {
                    if(res.error) {
                        document.getElementById('status').className = "text-danger mt-3";
                        document.getElementById('status').innerText = res.error;
                    } else {
                        document.getElementById('status').className = "text-success mt-3";
                        document.getElementById('status').innerText = res.success;
                        document.getElementById('nisn').value = "";
                    }
                });
            }, err => alert("GPS tidak aktif!"));
        }

        function showAdmin() { document.getElementById('adminPanel').style.display = 'block'; }

        function login() {
            const pass = document.getElementById('pass').value;
            fetch(API_URL, { method: "POST", body: JSON.stringify({action: "adminLogin", pass: pass}) })
            .then(r => r.json())
            .then(res => {
                if(res.success) document.getElementById('dash').style.display = 'block';
                else alert("Salah!");
            });
        }

        function download() {
            const f = document.getElementById('fKelas').value;
            fetch(API_URL, { method: "POST", body: JSON.stringify({action: "getRekap", filter: f}) })
            .then(r => r.json())
            .then(data => {
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Rekap");
                XLSX.writeFile(wb, "Presensi.xlsx");
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Online 60m</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f4f7f9; }
        .app-card { max-width: 400px; margin: 50px auto; border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #status { padding: 12px; border-radius: 10px; display: none; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card app-card p-4 bg-white">
            <h4 class="text-center fw-bold mb-4">📍 E-Presensi</h4>
            
            <div id="siswaArea">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Nomor Induk Siswa (NISN)</label>
                    <input type="number" id="nisn" class="form-control form-control-lg text-center" placeholder="Masukkan NISN">
                </div>
                <button class="btn btn-primary w-100 btn-lg shadow" id="btnAbsen" onclick="prosesAbsen()">Kirim Presensi</button>
            </div>

            <div id="status"></div>

            <hr class="my-4">
            <div class="text-center">
                <button class="btn btn-sm btn-outline-secondary border-0" onclick="toggleAdmin()">Menu Admin</button>
            </div>

            <div id="adminPanel" style="display:none;" class="mt-3">
                <input type="password" id="pass" class="form-control mb-2" placeholder="Password Admin">
                <button class="btn btn-dark w-100 mb-3" onclick="login()">Login</button>
                <div id="dash" style="display:none;" class="p-2 border rounded bg-light">
                    <label class="small fw-bold">Download Rekap Kelas:</label>
                    <select id="fKelas" class="form-select mb-2">
                        <option>Semua</option>
                        <option>X</option>
                        <option>XI</option>
                        <option>XII</option>
                    </select>
                    <button class="btn btn-success w-100" onclick="download()">Download (.XLS)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GANTI LINK DI BAWAH INI DENGAN LINK WEB APP KAMU
        const API_URL = "https://script.google.com/macros/s/AKfycbwn91oLZjFxaU627yqF3no7CXmNts0nhOpyi0fMefZ5-kX1d2tJhMqOk32deZMSRIHQ/exec"; 

        function prosesAbsen() {
            const nisn = document.getElementById('nisn').value;
            const statusDiv = document.getElementById('status');
            if(!nisn) return alert("Silakan isi NISN!");

            document.getElementById('btnAbsen').disabled = true;
            statusDiv.style.display = "block";
            statusDiv.className = "alert alert-info text-center";
            statusDiv.innerText = "⏳ Mengecek Lokasi...";

            navigator.geolocation.getCurrentPosition(pos => {
                const payload = { 
                    action: "submit", 
                    nisn: nisn, 
                    lat: pos.coords.latitude, 
                    lng: pos.coords.longitude 
                };

                fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
                .then(r => r.json())
                .then(res => {
                    if(res.error) {
                        statusDiv.className = "alert alert-danger text-center";
                        statusDiv.innerText = "❌ " + res.error;
                    } else {
                        statusDiv.className = "alert alert-success text-center";
                        statusDiv.innerText = "✅ " + res.success;
                        document.getElementById('nisn').value = "";
                    }
                    document.getElementById('btnAbsen').disabled = false;
                }).catch(() => {
                    alert("Gagal terhubung ke server!");
                    document.getElementById('btnAbsen').disabled = false;
                });
            }, err => {
                alert("GPS Tidak Aktif! Silakan aktifkan lokasi di pengaturan HP.");
                document.getElementById('btnAbsen').disabled = false;
                statusDiv.style.display = "none";
            });
        }

        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        function login() {
            const p = document.getElementById('pass').value;
            fetch(API_URL, { method: "POST", body: JSON.stringify({action: "adminLogin", pass: p}) })
            .then(r => r.json()).then(res => {
                if(res.success) document.getElementById('dash').style.display = 'block';
                else alert("Password Admin Salah!");
            });
        }

        function download() {
            const f = document.getElementById('fKelas').value;
            fetch(API_URL, { method: "POST", body: JSON.stringify({action: "getRekap", filter: f}) })
            .then(r => r.json()).then(data => {
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Presensi");
                XLSX.writeFile(wb, `Rekap_Presensi_${f}.xlsx`);
            });
        }
    </script>
</body>
</html>
